<svg xmlns="http://www.w3.org/2000/svg" width="800" height="720" viewBox="0 0 400 360">
  <!-- Original artwork — hand-authored, copyright-clean.
       White fills cover overlaps; black lines are the coloring boundaries. -->
  <g fill="#fff" stroke="#000" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <!-- Ears (behind the face) -->
    <path d="M70,150 L55,35 L180,90 Z" />
    <path d="M330,150 L345,35 L220,90 Z" />
    <!-- Face -->
    <ellipse cx="200" cy="215" rx="150" ry="125" />
    <!-- Inner ears (in front of the face) -->
    <path d="M88,135 L70,58 L150,92 Z" />
    <path d="M312,135 L330,58 L250,92 Z" />
    <!-- Cheeks -->
    <circle cx="115" cy="250" r="24" />
    <circle cx="285" cy="250" r="24" />
  </g>

  <!-- Face details (not colorable) -->
  <g fill="#000" stroke="none">
    <ellipse cx="150" cy="200" rx="17" ry="24" />
    <ellipse cx="250" cy="200" rx="17" ry="24" />
    <path d="M186,232 L214,232 L200,250 Z" />
  </g>
  <g fill="#fff" stroke="none">
    <circle cx="156" cy="191" r="6" />
    <circle cx="256" cy="191" r="6" />
  </g>

  <!-- Mouth + whiskers -->
  <g fill="none" stroke="#000" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M200,250 Q200,273 176,273" />
    <path d="M200,250 Q200,273 224,273" />
    <path d="M40,214 L100,222" />
    <path d="M36,240 L100,242" />
    <path d="M40,266 L100,260" />
    <path d="M360,214 L300,222" />
    <path d="M364,240 L300,242" />
    <path d="M360,266 L300,260" />
  </g>
</svg>
